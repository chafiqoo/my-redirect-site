<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Loading</title>
  
  <!-- 
    SUPER CLEAN LANDING PAGE
    - No text about redirecting
    - No target URL shown
    - No "bullshit" messages
    - Just a simple, elegant loading animation
    - Stays exactly 3 seconds then redirects
    - All sub1..sub10 & source_id parameters are randomized on each visit
  -->

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #00c300 0%, #008a00 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    /* Minimal card - clean, no text clutter */
    .loading-container {
      text-align: center;
    }

    /* Simple spinner using #edff9a and white */
    .spinner {
      width: 64px;
      height: 64px;
      margin: 0 auto;
      position: relative;
    }

    .spinner:before {
      content: '';
      box-sizing: border-box;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 4px solid rgba(255, 255, 255, 0.2);
      border-top-color: #edff9a;
      border-right-color: #edff9a;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Optional: subtle pulsing dots - very minimal */
    .dots {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 32px;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: #edff9a;
      border-radius: 50%;
      opacity: 0.6;
      animation: pulse 1.4s ease-in-out infinite;
    }

    .dot:nth-child(1) {
      animation-delay: 0s;
    }
    .dot:nth-child(2) {
      animation-delay: 0.2s;
    }
    .dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 0.3;
        transform: scale(0.8);
      }
      50% {
        opacity: 1;
        transform: scale(1.2);
      }
    }

    /* No text, no URL, no messages - completely clean */
  </style>
</head>
<body>
  <div class="loading-container">
    <div class="spinner"></div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <script>
    (function() {
      // ============================================================
      // BASE URL - edit this to change destination
      // All '10' values will be replaced with random numbers
      // ============================================================
      const BASE_URL = "https://www.therebths.com/9HF976T/2XQ49H91/?source_id=sh&sub1=10&sub2=10&sub3=10&sub4=10&sub5=10&sub6=10&sub7=10&sub8=10&sub9=10&sub10=10";
      
      // Delay: exactly 3 seconds
      const DELAY_SECONDS = 3;
      
      // ------------------------------------------------------------------
      // Generate random integer between min and max
      // ------------------------------------------------------------------
      function getRandomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }
      
      // Generate random tracking value (1 - 999999)
      function getRandomTrackingValue() {
        return getRandomInt(1, 999999);
      }
      
      // ------------------------------------------------------------------
      // Create randomized URL: replace source_id and sub1..sub10 with random numbers
      // ------------------------------------------------------------------
      function generateRandomizedUrl(baseUrl) {
        let url;
        try {
          url = new URL(baseUrl);
        } catch (e) {
          // Fallback: regex replace if URL constructor fails
          let fallbackUrl = baseUrl;
          fallbackUrl = fallbackUrl.replace(/([?&])([^=]+)=10(?=&|$|#)/g, (match, prefix, paramName) => {
            return `${prefix}${paramName}=${getRandomTrackingValue()}`;
          });
          fallbackUrl = fallbackUrl.replace(/=10$/, `=${getRandomTrackingValue()}`);
          return fallbackUrl;
        }
        
        const params = url.searchParams;
        const paramKeys = ['source_id', 'sub1', 'sub2', 'sub3', 'sub4', 'sub5', 'sub6', 'sub7', 'sub8', 'sub9', 'sub10'];
        
        for (let key of paramKeys) {
          if (params.has(key)) {
            params.set(key, getRandomTrackingValue());
          }
        }
        
        url.search = params.toString();
        return url.toString();
      }
      
      // Generate the final URL with random parameters (unique for this visit)
      const finalRedirectUrl = generateRandomizedUrl(BASE_URL);
      
      // Optional debug in console only (not visible to user)
      console.log("Redirect ready (3s delay)");
      
      let redirectCancelled = false;
      let timeoutId = null;
      
      function executeRedirect() {
        if (redirectCancelled) return;
        redirectCancelled = true;
        if (timeoutId) clearTimeout(timeoutId);
        window.location.href = finalRedirectUrl;
      }
      
      // Set timeout for exactly 3 seconds
      timeoutId = setTimeout(executeRedirect, DELAY_SECONDS * 1000);
      
      // For extra safety: if page becomes visible after blur, still redirect on time.
      // The timeout is absolute.
    })();
  </script>
</body>
</html>
